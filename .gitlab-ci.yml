image: php:8.1-cli

stages:
  - deploy_new_vps

deploy_new_vps:
  stage: deploy_new_vps

  before_script:
    - apt-get update -yqq
    - apt-get install -yqq openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_LAZAREFORTUNE_KEY" | base64 -d > ~/.ssh/id_deploy
    - chmod 600 ~/.ssh/id_deploy
    - ssh-keygen -y -f ~/.ssh/id_deploy > /dev/null
    - ssh-keyscan -p "$SSH_LAZAREFORTUNE_PORT" -H "$SSH_LAZAREFORTUNE_HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

  script:
    - |
      ssh -i ~/.ssh/id_deploy -p "$SSH_LAZAREFORTUNE_PORT" "$SSH_LAZAREFORTUNE_USER@$SSH_LAZAREFORTUNE_HOST" << 'EOF'
      set -e

      echo "Déploiement lazarefortune.com"

      cd /var/www/lazarefortune

      git reset --hard HEAD
      git pull gitlab main

      bash deploy/check-php.sh

      composer install \
        --prefer-dist \
        --no-ansi \
        --no-interaction \
        --no-scripts \
        --no-dev \
        --no-plugins \
        --ignore-platform-req=php

      composer dump-autoload \
        --no-dev \
        --classmap-authoritative \
        --no-ansi \
        --no-interaction

      php bin/console doctrine:migrations:migrate --no-interaction

      if command -v pnpm >/dev/null 2>&1; then
        pnpm install
        pnpm run build
      else
        echo "pnpm introuvable sur le serveur"
        exit 1
      fi

      php bin/console cache:clear --env=prod

      echo "Déploiement lazarefortune.com terminé"
      EOF

  only:
    - main
